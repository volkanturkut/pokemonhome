name: Build NRO

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        run: make

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-nro
          path: "*.nro"
